<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">404 Không tìm thấy trang</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .error-page {
            text-align: center;
            padding: 100px 0 150px 0;
        }
        .error-title {
            font-size: 110px;
            font-weight: 500;
            letter-spacing: 3px;
            margin: 0 0 40px 0;
        }
        .error-desc {
            font-size: 16px;
            color: #000;
            margin-bottom: 80px;
        }
        .btn-error {
            background-color: var(--secondary-color, #DB4444);
            color: #fff;
            padding: 16px 48px;
            text-decoration: none;
            border-radius: 4px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>

    <main class="container">
        <div class="breadcrumb" style="margin-top: 40px;">
            <a href="/">Trang chủ</a> <span class="separator">/</span> 
            <span class="current">404 Error</span>
        </div>

        <div class="error-page">
            <h1 class="error-title">404 Not Found</h1>
            <p class="error-desc">Your visited page not found. You may go home page.</p>
            <a href="/" class="btn-error">Trở về Trang chủ</a>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
