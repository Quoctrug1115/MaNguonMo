<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Quản lý Khách hàng</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
    <div class="admin-layout">
        <div class="main-content">
            <main class="dashboard-body">
                <div class="page-header-row">
                    <h1 class="page-title">Danh sách Khách Hàng</h1>
                    <div class="search-bar" style="background: #fff; border: 1px solid #E5E5E5;">
                        <i class="ph ph-magnifying-glass"></i>
                        <input type="text" placeholder="Tìm tên, email...">
                    </div>
                </div>

                <div class="table-section">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Khách Hàng</th>
                                <th>Mã KH</th>
                                <th>Số điện thoại</th>
                                <th>Tổng chi tiêu</th>
                                <th>Trạng thái</th>
                                <th>Hành động</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="c : ${customers}">
                                <td>
                                    <div class="product-cell">
                                        <img th:src="'https://ui-avatars.com/api/?name=' + ${c.name} + '&background=random&color=fff'" alt="Avatar" style="border-radius: 50%;">
                                        <div>
                                            <div style="font-weight: 600;" th:text="${c.name}">Nguyễn Văn A</div>
                                            <div style="font-size: 12px; color: #7D8184;" th:text="${c.email}">email@gmail.com</div>
                                        </div>
                                    </div>
                                </td>
                                <td th:text="${c.id}">CUS-001</td>
                                <td th:text="${c.phone}">0901234567</td>
                                <td th:text="'$' + ${c.spent}">$1500</td>
                                <td>
                                    <span th:if="${c.status == 'Active'}" class="badge-status status-delivered">Hoạt động</span>
                                    <span th:if="${c.status == 'Blocked'}" class="badge-status status-cancelled">Bị khóa</span>
                                </td>
                                <td>
                                    <div class="action-buttons">
                                        <button class="action-btn view-btn" title="Xem hồ sơ"><i class="ph ph-user-circle"></i></button>
                                        <button class="action-btn delete-btn" title="Khóa tài khoản" th:if="${c.status == 'Active'}"><i class="ph ph-lock-key"></i></button>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
