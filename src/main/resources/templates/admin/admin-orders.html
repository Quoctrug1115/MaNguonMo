<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Orders</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
    <div class="admin-layout">
        
        <div class="main-content">
            <main class="dashboard-body">
                <div class="page-header-row">
                    <h1 class="page-title">Quản lý Đơn Hàng</h1>
                    <div class="filter-actions">
                        <input type="date" class="admin-input">
                        <select class="admin-select">
                            <option>Tất cả trạng thái</option>
                            <option>Pending</option>
                            <option>Processing</option>
                            <option>Delivered</option>
                            <option>Cancelled</option>
                        </select>
                    </div>
                </div>

                <div class="table-section">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Mã Đơn</th>
                                <th>Khách Hàng</th>
                                <th>Ngày Đặt</th>
                                <th>Tổng Tiền</th>
                                <th>Trạng Thái</th>
                                <th>Chi tiết</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="order : ${orders}">
                                <td th:text="${order.id}">ORD-1001</td>
                                <td th:text="${order.customer}" style="font-weight: 500; color: #202224;">Nguyễn Văn A</td>
                                <td th:text="${order.date}">22/04/2026</td>
                                <td th:text="'$' + ${order.total}">$1698</td>
                                <td>
                                    <span th:class="'badge-status status-' + ${#strings.toLowerCase(order.status)}" th:text="${order.status}">Delivered</span>
                                </td>
                                <td>
                                    <button class="action-btn view-btn" title="Xem chi tiết"><i class="ph ph-eye"></i></button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
