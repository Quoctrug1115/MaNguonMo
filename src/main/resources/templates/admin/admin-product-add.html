<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Thêm/Sửa Sản Phẩm - Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
    <div class="admin-layout">
        
        <aside class="sidebar">
            <div class="sidebar-logo">
                <span class="logo-text">Cửa Hàng<br><span style="color: #000;">Điện Máy</span></span>
            </div>
            <nav class="sidebar-menu">
                <a href="/admin" class="menu-item"><i class="ph ph-squares-four"></i> Dashboard</a>
                <a href="/admin/products" class="menu-item active"><i class="ph ph-box-cube"></i> Sản Phẩm</a>
                <a href="/admin/orders" class="menu-item"><i class="ph ph-shopping-cart"></i> Đơn Hàng</a>
                <a href="/admin/customers" class="menu-item"><i class="ph ph-users"></i> Khách Hàng</a>
                <div class="menu-divider">PAGES</div>
                <a href="#" class="menu-item text-danger"><i class="ph ph-sign-out"></i> Logout</a>
            </nav>
        </aside>

        <div class="main-content">
            
            <header class="topbar">
                <div class="search-bar">
                    <i class="ph ph-magnifying-glass"></i>
                    <input type="text" placeholder="Tìm kiếm...">
                </div>
                <div class="topbar-actions">
                    <div class="user-profile">
                        <img src="https://ui-avatars.com/api/?name=Admin+User&background=2563EB&color=fff" alt="Avatar">
                        <div class="user-info">
                            <span class="user-name">Admin</span>
                            <span class="user-role">Quản trị viên</span>
                        </div>
                    </div>
                </div>
            </header>

            <main class="dashboard-body">
                <div class="page-header-row">
                    <h1 class="page-title" th:text="${product.id != null ? 'Cập nhật Sản Phẩm' : 'Thêm Sản Phẩm Mới'}">Thêm Sản Phẩm</h1>
                    <div class="action-buttons">
                        <a th:href="@{/admin/products}" class="btn-admin-outline">Hủy bỏ</a>
                    </div>
                </div>

                <form th:action="@{/admin/product-add}" th:object="${product}" method="POST" class="product-form-layout" style="width: 100%;">
                    
                    <input type="hidden" th:field="*{id}">

                    <div style="position: absolute; top: 110px; right: 40px; z-index: 10;">
                        <button type="submit" class="btn-admin-primary"><i class="ph ph-floppy-disk"></i> Lưu Sản Phẩm</button>
                    </div>

                    <div class="form-column left-column">
                        <div class="admin-card">
                            <h2 class="card-title">Thông tin cơ bản</h2>
                            
                            <div class="form-group">
                                <label>Tên sản phẩm <span class="text-danger">*</span></label>
                                <input type="text" th:field="*{name}" class="admin-input-full" placeholder="Nhập tên sản phẩm..." required>
                            </div>
                        </div>
                    </div>

                    <div class="form-column right-column">
                        <div class="admin-card">
                            <h2 class="card-title">Tổ chức & Phân loại</h2>
                            <div class="form-group">
                                <label>Danh mục</label>
                                <select th:field="*{category}" class="admin-input-full">
                                    <option value="Điện thoại">Điện thoại</option>
                                    <option value="Laptop">Laptop</option>
                                    <option value="Đồng hồ">Đồng hồ</option>
                                    <option value="Gaming">Gaming</option>
                                    <option value="Phụ kiện">Phụ kiện</option>
                                </select>
                            </div>
                            <div class="form-grid-2">
                                <div class="form-group">
                                    <label>Giá bán ($)</label>
                                    <input type="number" step="0.01" th:field="*{price}" class="admin-input-full" placeholder="0.00" required>
                                </div>
                                <div class="form-group">
                                    <label>Tồn kho</label>
                                    <input type="number" th:field="*{stock}" class="admin-input-full" placeholder="100">
                                </div>
                            </div>
                            
                            <div class="form-group" style="margin-top: 20px;">
                                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; margin-bottom: 10px;">
                                    <input type="checkbox" th:field="*{isFlashSale}" style="width: 18px; height: 18px;"> Đưa vào Flash Sale
                                </label>
                                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; margin-bottom: 10px;">
                                    <input type="checkbox" th:field="*{isBestSelling}" style="width: 18px; height: 18px;"> Đưa vào Bán Chạy
                                </label>
                                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                                    <input type="checkbox" th:field="*{isFeatured}" style="width: 18px; height: 18px;"> Đưa vào Nổi Bật
                                </label>
                            </div>
                        </div>
                    </div>
                </form>
            </main>
        </div>
    </div>
</body>
</html>
