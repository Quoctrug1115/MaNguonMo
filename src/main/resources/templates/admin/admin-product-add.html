<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Thêm Sản Phẩm Mới</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
    <div class="admin-layout">
        <div class="main-content">
            <main class="dashboard-body">
                <div class="page-header-row">
                    <h1 class="page-title">Thêm Sản Phẩm Mới</h1>
                    <div class="action-buttons">
                        <a href="/admin/products" class="btn-admin-outline">Hủy bỏ</a>
                        <button class="btn-admin-primary"><i class="ph ph-floppy-disk"></i> Lưu Sản Phẩm</button>
                    </div>
                </div>

                <form action="#" class="product-form-layout">
                    <div class="form-column left-column">
                        <div class="admin-card">
                            <h2 class="card-title">Thông tin cơ bản</h2>
                            
                            <div class="form-group">
                                <label>Tên sản phẩm <span class="text-danger">*</span></label>
                                <input type="text" class="admin-input-full" placeholder="Nhập tên sản phẩm...">
                            </div>

                            <div class="form-group">
                                <label>Mô tả sản phẩm</label>
                                <textarea class="admin-textarea" rows="6" placeholder="Mô tả chi tiết tính năng..."></textarea>
                            </div>
                        </div>
                    </div>

                    <div class="form-column right-column">
                        <div class="admin-card">
                            <h2 class="card-title">Hình ảnh sản phẩm</h2>
                            <div class="image-upload-zone">
                                <i class="ph ph-cloud-arrow-up icon-large"></i>
                                <p>Kéo thả hình ảnh vào đây hoặc <span>Tải lên từ thiết bị</span></p>
                            </div>
                        </div>

                        <div class="admin-card">
                            <h2 class="card-title">Tổ chức & Phân loại</h2>
                            <div class="form-group">
                                <label>Danh mục</label>
                                <select class="admin-input-full">
                                    <option>Điện thoại</option>
                                    <option>Laptop</option>
                                    <option>Đồng hồ</option>
                                </select>
                            </div>
                            <div class="form-grid-2">
                                <div class="form-group">
                                    <label>Giá bán ($)</label>
                                    <input type="number" class="admin-input-full" placeholder="0.00">
                                </div>
                                <div class="form-group">
                                    <label>Tồn kho</label>
                                    <input type="number" class="admin-input-full" placeholder="100">
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </main>
        </div>
    </div>
</body>
</html>
