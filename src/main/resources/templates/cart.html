<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Giỏ hàng</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/cart.css}"> </head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>

    <main class="container" style="padding-top: 40px; padding-bottom: 80px;">
        <div class="breadcrumb">
            <a href="/">Trang chủ</a> <span class="separator">/</span> 
            <span class="current">Giỏ hàng</span>
        </div>

        <div class="cart-section">
            <table class="cart-table">
                <thead>
                    <tr>
                        <th>Sản phẩm</th>
                        <th>Giá</th>
                        <th>Số lượng</th>
                        <th>Thành tiền</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${cartItems == null or cartItems.isEmpty()}">
                        <td colspan="4" style="text-align: center; padding: 40px;">Giỏ hàng của bạn đang trống!</td>
                    </tr>

                    <tr th:each="item : ${cartItems}">
                        <td class="cart-product-info">
                            <a th:href="@{'/cart/remove/' + ${item.productId}}" class="remove-item-btn"><i class="ph ph-x-circle"></i></a>
                            <img th:src="${item.img}" alt="Product">
                            <span th:text="${item.name}">Tên sản phẩm</span>
                        </td>
                        <td th:text="'$' + ${item.price}">$650</td>
                        <td>
                            <form th:action="@{'/cart/update/' + ${item.productId}}" method="POST" style="margin: 0;">
                                <input type="number" name="quantity" th:value="${item.quantity}" min="0" class="qty-input-box" onchange="this.form.submit()">
                            </form>
                        </td>
                        <td th:text="'$' + (${item.price} * ${item.quantity})">$650</td>
                    </tr>
                </tbody>
            </table>

            <div class="cart-actions-row">
                <a th:href="@{/products}" class="btn-outline">Tiếp tục mua sắm</a>
                
                <a th:href="@{/cart/clear}" class="btn-outline" style="color: #EF4444; border-color: #EF4444;" onclick="return confirm('Bạn có chắc chắn muốn xóa toàn bộ giỏ hàng?');">
                    Xóa toàn bộ giỏ hàng
                </a>
            </div>

            <div class="cart-bottom-row">
                <div class="coupon-box">
                    <input type="text" placeholder="Mã giảm giá">
                    <button class="btn-primary">Áp dụng</button>
                </div>

                <div class="cart-summary">
                    <h3>Tổng cộng</h3>
                    <div class="summary-row">
                        <span>Tạm tính</span>
                        <span th:text="'$' + ${subtotal}">$0.00</span>
                    </div>
                    <div class="summary-row total-row">
                        <span>Thành tiền</span>
                        <span th:text="'$' + ${subtotal}">$0.00</span>
                    </div>
                    
                    <!-- Sửa đường dẫn ở đây -->
                    <a th:href="@{/checkout}" class="btn-primary" style="width: 100%; display: block; text-align: center;">Tiến hành Thanh toán</a>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
