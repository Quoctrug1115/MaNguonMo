<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Thanh toán</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/checkout.css}"> </head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>

    <main class="container" style="padding-top: 40px; padding-bottom: 80px;">
        <div class="breadcrumb">
            <a href="/">Account</a> <span class="separator">/</span> 
            <a href="#">My Account</a> <span class="separator">/</span> 
            <a href="/cart">Giỏ hàng</a> <span class="separator">/</span> 
            <span class="current">Thanh toán</span>
        </div>

        <h1 class="checkout-title">Chi tiết hóa đơn</h1>

        <form action="#" method="POST" class="checkout-wrapper">
            
            <div class="billing-details">
                <div class="form-group">
                    <label>Họ và Tên <span class="required">*</span></label>
                    <input type="text" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Tên công ty (Tùy chọn)</label>
                    <input type="text" class="form-control">
                </div>
                <div class="form-group">
                    <label>Địa chỉ <span class="required">*</span></label>
                    <input type="text" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Thành phố <span class="required">*</span></label>
                    <input type="text" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Số điện thoại <span class="required">*</span></label>
                    <input type="tel" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Email <span class="required">*</span></label>
                    <input type="email" class="form-control" required>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="save-info">
                    <label for="save-info">Lưu thông tin này cho lần thanh toán sau</label>
                </div>
            </div>

            <div class="order-summary">
                
                <div class="summary-items">
                    <div th:each="item : ${checkoutItems}" class="summary-item">
                        <div class="summary-item-info">
                            <img th:src="${item.img}" alt="Product">
                            <span th:text="${item.name}">Tên sản phẩm</span>
                        </div>
                        <span th:text="'$' + ${item.price}">$650</span>
                    </div>
                </div>

                <div class="summary-totals">
                    <div class="total-line">
                        <span>Tạm tính:</span>
                        <span th:text="'$' + ${total}">$1750</span>
                    </div>
                    <div class="total-line">
                        <span>Phí vận chuyển:</span>
                        <span>Miễn phí</span>
                    </div>
                    <div class="total-line total-final">
                        <span>Tổng thanh toán:</span>
                        <span th:text="'$' + ${total}">$1750</span>
                    </div>
                </div>

                <div class="payment-methods">
                    <div class="payment-option">
                        <input type="radio" id="bank" name="payment" value="bank" checked>
                        <label for="bank" class="bank-label">
                            Chuyển khoản ngân hàng 
                            <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg" alt="Visa" class="card-icon">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg" alt="Mastercard" class="card-icon">
                        </label>
                    </div>
                    <div class="payment-option">
                        <input type="radio" id="cod" name="payment" value="cod">
                        <label for="cod">Thanh toán khi nhận hàng (COD)</label>
                    </div>
                </div>

                <div class="coupon-box" style="margin-bottom: 24px;">
                    <input type="text" placeholder="Mã giảm giá">
                    <button type="button" class="btn-primary">Áp dụng</button>
                </div>

                <button type="submit" class="btn-primary btn-place-order">Xác nhận đặt hàng</button>
            </div>
        </form>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
