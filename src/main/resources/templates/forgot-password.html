<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Quên mật khẩu</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/auth.css}"> </head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>

    <main class="auth-page">
        <div class="auth-container">
            <div class="auth-image-box">
                <img th:src="@{/images/auth-bg.png}" alt="Shopping Mobile">
            </div>

            <div class="auth-form-box">
                <h1 class="auth-title">Quên Mật Khẩu?</h1>
                <p class="auth-subtitle" style="line-height: 1.5; margin-bottom: 30px;">
                    Đừng lo lắng! Vui lòng nhập địa chỉ email bạn đã đăng ký. Chúng tôi sẽ gửi cho bạn một liên kết để đặt lại mật khẩu.
                </p>

                <form action="#" method="POST" class="auth-form">
                    <div class="form-group">
                        <input type="email" id="email" placeholder="Nhập Email của bạn" required>
                    </div>

                    <div class="auth-actions-column">
                        <button type="submit" class="btn-primary w-100">Gửi liên kết khôi phục</button>
                    </div>
                </form>

                <div class="auth-footer text-center" style="margin-top: 30px;">
                    <p><i class="ph ph-arrow-left" style="vertical-align: middle; margin-right: 4px;"></i> 
                       <a th:href="@{/login}" style="margin-left: 0;">Quay lại Đăng nhập</a>
                    </p>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
