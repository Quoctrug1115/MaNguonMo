<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Đăng nhập - Cửa Hàng Điện Máy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">

    <style>
        /* Tái sử dụng CSS layout giống hệt trang Register */
        body { background-color: #fff; }
        .auth-container { display: flex; max-width: 1200px; margin: 40px auto; min-height: 600px; padding: 0 20px; }
        .auth-image-side { flex: 1.1; background-color: #C8E6E5; display: flex; justify-content: center; align-items: center; }
        .auth-image-side img { max-width: 90%; height: auto; object-fit: contain; }
        .auth-form-side { flex: 0.9; padding: 40px 80px; display: flex; flex-direction: column; justify-content: center; }
        
        .auth-title { font-size: 36px; font-weight: 500; margin-bottom: 5px; color: #000; }
        .auth-subtitle { font-size: 16px; color: #000; margin-bottom: 40px; }
        
        .form-group { margin-bottom: 30px; position: relative; }
        .form-input { width: 100%; border: none; border-bottom: 1px solid #9ca3af; padding: 10px 0; font-size: 15px; outline: none; background: transparent; transition: 0.3s; }
        .form-input::placeholder { color: #9ca3af; }
        .form-input:focus { border-bottom-color: #3B82F6; }
        
        .btn-primary { width: 100%; background-color: #3B82F6; color: white; border: none; padding: 15px; font-size: 16px; font-weight: 500; cursor: pointer; margin-bottom: 15px; transition: 0.2s; }
        .btn-primary:hover { background-color: #2563EB; }
        
        .btn-google { width: 100%; background-color: white; color: #333; border: 1px solid #d1d5db; padding: 14px; font-size: 15px; font-weight: 500; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 20px; transition: 0.2s; }
        .btn-google:hover { background-color: #f9fafb; }
        .btn-google img { width: 20px; height: 20px; }
        
        .auth-footer-link { display: flex; justify-content: space-between; font-size: 14px; color: #6b7280; margin-bottom: 30px; }
        .auth-footer-link a { color: #DC2626; text-decoration: none; }
        
        .register-hint { text-align: center; font-size: 15px; color: #6b7280; }
        .register-hint a { color: #000; font-weight: 500; text-decoration: none; border-bottom: 1px solid #000; padding-bottom: 2px; }
        
        .error-msg { color: #DC2626; font-size: 14px; margin-bottom: 20px; padding: 10px; background: #FEF2F2; border-radius: 5px; border: 1px solid #F87171; text-align: center; }
        .success-msg { color: #059669; font-size: 14px; margin-bottom: 20px; padding: 10px; background: #D1FAE5; border-radius: 5px; border: 1px solid #34D399; text-align: center; }
        
        .site-footer { background-color: #3B82F6; color: white; padding: 60px 20px; margin-top: 40px; }
        .footer-content { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 30px; }
        .footer-col h4 { font-size: 20px; font-weight: 600; margin-bottom: 20px; }
        .footer-col p, .footer-col a { color: rgba(255,255,255,0.9); font-size: 14px; line-height: 1.8; text-decoration: none; display: block; }
    </style>
</head>
<body>

     <div th:replace="~{fragments/header :: header}"></div>

    <div class="auth-container">
        <div class="auth-image-side">
            <!-- Thay link ảnh của bạn vào đây -->
            <img src="https://placehold.co/600x600/C8E6E5/C8E6E5?text=Ảnh+Đăng+Nhập" alt="Login Illustration">
        </div>

        <div class="auth-form-side">
            <h1 class="auth-title">Đăng nhập</h1>
            <p class="auth-subtitle">Điền thông tin của bạn</p>

            <!-- Hiện thông báo lỗi nếu nhập sai -->
            <div class="error-msg" th:if="${error != null}" th:text="${error}"></div>
            
            <!-- Hiện thông báo nếu vừa đăng ký thành công -->
            <div class="success-msg" th:if="${param.success != null}">Đăng ký thành công! Vui lòng đăng nhập.</div>

            <form th:action="@{/login}" method="POST">
                <div class="form-group">
                    <input type="text" name="username" class="form-input" placeholder="Tên đăng nhập" required>
                </div>

                <div class="form-group" style="margin-bottom: 15px;">
                    <input type="password" name="password" class="form-input" placeholder="Mật khẩu" required>
                </div>

                <div class="auth-footer-link">
                    <span></span>
                    <a href="#">Quên Mật Khẩu ?</a>
                </div>

                <button type="submit" class="btn-primary">Đăng nhập</button>
                
                <button type="button" class="btn-google">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google">
                    Log in with Google
                </button>
            </form>

            <div class="register-hint">
                Bạn chưa có tài khoản? <a href="/register">Đăng ký</a>
            </div>
        </div>
    </div>

    <!-- Rút gọn lại Footer xanh cho đỡ dài code -->
    <footer class="site-footer">
        <div class="footer-content">
            <div class="footer-col" style="flex: 1.5;"><h4>Cửa Hàng Điện Máy</h4><p>Get 10% off your first order</p></div>
            <div class="footer-col" style="flex: 1;"><p style="font-weight: 600;">Hỗ trợ</p><p>cuahangdienmay@gmail.com</p></div>
        </div>
    </footer>

</body>
</html>
