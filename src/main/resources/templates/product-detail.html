<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Chi tiết sản phẩm</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/product-detail.css}"> </head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>

    <main class="container" style="padding-top: 40px; padding-bottom: 80px;">
        <div class="breadcrumb">
            <a href="/">Trang chủ</a> <span class="separator">/</span> 
            <a href="#">Gaming</a> <span class="separator">/</span> 
            <span class="current" th:text="${productName}">Havic HV G-92 Gamepad</span>
        </div>

        <div class="product-detail-wrapper">
            
            <div class="product-gallery">
                <div class="thumbnails">
                    <div class="thumb-item active"><img th:src="@{/images/gamepad-1.png}" alt="Thumb 1"></div>
                    <div class="thumb-item"><img th:src="@{/images/gamepad-2.png}" alt="Thumb 2"></div>
                    <div class="thumb-item"><img th:src="@{/images/gamepad-3.png}" alt="Thumb 3"></div>
                    <div class="thumb-item"><img th:src="@{/images/gamepad-4.png}" alt="Thumb 4"></div>
                </div>
                <div class="main-image">
                    <img th:src="@{/images/gamepad-main.png}" alt="Main Product">
                </div>
            </div>

            <div class="product-info">
                <h1 th:text="${productName}">Havic HV G-92 Gamepad</h1>
                
                <div class="rating-stock">
                    <div class="stars">★★★★★</div>
                    <span class="reviews" th:text="'(' + ${rating} + ' đánh giá)'">(150)</span>
                    <span class="divider">|</span>
                    <span class="stock status-in">Còn hàng</span>
                </div>

                <div class="price" th:text="'$' + ${price}">$192.00</div>
                <p class="description" th:text="${description}">Mô tả chi tiết sản phẩm...</p>
                
                <hr class="divider-line">

                <div class="options">
                    <span class="option-label">Size:</span>
                    <div class="size-list">
                        <button class="size-btn">XS</button>
                        <button class="size-btn">S</button>
                        <button class="size-btn active">M</button>
                        <button class="size-btn">L</button>
                        <button class="size-btn">XL</button>
                    </div>
                </div>

                <div class="actions-row">
                    <div class="quantity-selector">
                        <button class="qty-btn minus">-</button>
                        <input type="text" value="2" class="qty-input">
                        <button class="qty-btn plus">+</button>
                    </div>
                    <button class="btn-primary buy-now-btn">Mua ngay</button>
                    <button class="btn-icon wishlist-btn"><i class="ph ph-heart"></i></button>
                </div>

                <div class="delivery-card">
                    <div class="delivery-item">
                        <i class="ph ph-truck"></i>
                        <div>
                            <h4>Giao hàng miễn phí</h4>
                            <p>Nhập mã bưu điện để xem trạng thái giao hàng</p>
                        </div>
                    </div>
                    <div class="delivery-item border-top">
                        <i class="ph ph-arrows-counter-clockwise"></i>
                        <div>
                            <h4>Hoàn trả hàng</h4>
                            <p>Hoàn trả hàng miễn phí trong 30 ngày. <a href="#">Chi tiết</a></p>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>
</body>
</html>
