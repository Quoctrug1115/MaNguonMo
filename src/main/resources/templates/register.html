<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Tạo tài khoản</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main class="auth-page">
    <div class="auth-container">
        <div class="auth-image-box">
            <img th:src="@{/images/auth-bg.png}" alt="Shopping Mobile">
        </div>

        <div class="auth-form-box">
            <h1 class="auth-title">Tạo tài khoản</h1>
            <p class="auth-subtitle">Điền thông tin của bạn</p>

            <form action="#" method="POST" class="auth-form">
                <div class="form-group">
                    <input type="text" id="fullname" placeholder="Họ và Tên" required>
                </div>

                <div class="form-group">
                    <input type="text" id="username" placeholder="Email hoặc Số Điện Thoại" required>
                </div>

                <div class="form-group">
                    <input type="password" id="password" placeholder="Mật khẩu" required>
                </div>

                <div class="auth-actions-column">
                    <button type="submit" class="btn-primary w-100">Tạo tài khoản</button>

                    <button type="button" class="btn-google w-100">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo" class="google-icon">
                        Sign up with Google
                    </button>
                </div>
            </form>

            <div class="auth-footer text-center" style="margin-top: 30px;">
                <p>Bạn đã có tài khoản? <a th:href="@{/login}">Đăng nhập</a></p>
            </div>
        </div>
    </div>
</main>

</body>
</html>
